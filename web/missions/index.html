      var visitedCount = loggedIn ? openItems.filter(function(x) { return x.visited; }).length : 0;

      var content = document.getElementById("content");
      content.innerHTML = "";

      function makeRow(icon, label, req, earned, cls, pct) {
        var row = document.createElement("div");
        row.className = "badge-row" + (earned ? " earned" + (cls ? " " + cls : "") : "");
        if (pct !== undefined && loggedIn && !earned && pct > 0) {
          var fillColor = cls === "region" ? "#bbdefb" : "#c8e6c9";
          row.style.background = "linear-gradient(to right, " + fillColor + " " + pct + "%, #fafafa " + pct + "%)";
        }
        row.innerHTML =
          '<div class="badge-icon">' + icon + '</div>' +
          '<div class="badge-info"><div class="badge-name">' + label + '</div><div class="badge-desc">' + req + '</div></div>' +
          '<div class="badge-status">' + (earned ? "✅ 達成" : (loggedIn ? pct !== undefined ? pct + "%" : "未達成" : "-")) + '</div>';
        return row;
      }

      // --- 訪問数バッジ ---
      var sec1 = document.createElement("div");
      sec1.className = "missions-section";
      sec1.innerHTML = '<h2>訪問数バッジ（' + (loggedIn ? visitedCount + " / " + total + " 園達成" : "ログインで表示") + '）</h2>';
      var list1 = document.createElement("div");
      list1.className = "badge-list";
      VISIT_BADGES.forEach(function(b) {
        list1.appendChild(makeRow(b.icon, b.label, b.req, loggedIn && b.check(visitedCount, total), ""));
      });
      sec1.appendChild(list1);
      content.appendChild(sec1);

      // --- 動物バッジ（種別グループ表示） ---
      var sec4 = document.createElement("div");
      sec4.className = "missions-section";
      sec4.innerHTML = '<h2>動物バッジ</h2>';
      var list4 = document.createElement("div");
      list4.className = "badge-list";

      var ANIMAL_GROUPS = [
        { name: "ゾウ",           icon: "🐘" },
        { name: "キリン",         icon: "🦒" },
        { name: "ライオン",       icon: "🦁" },
        { name: "トラ",           icon: "🐯" },
        { name: "パンダ",         icon: "🐼" },
        { name: "ゴリラ",         icon: "🦍" },
        { name: "カバ",           icon: "🦛" },
        { name: "コアラ",         icon: "🐨" },
        { name: "ホッキョクグマ", icon: "🐻‍❄️" },
        { name: "レッサーパンダ", icon: "🦊" },
      ];

      ANIMAL_GROUPS.forEach(function(group) {
        var tiers = ANIMAL_BADGES.filter(function(b) { return b.label.indexOf(group.name) === 0; });
        if (!tiers.length) return;

        var earnedTiers = tiers.filter(function(b) { return loggedIn && b.check(items); });
        var highestEarned = earnedTiers.length ? earnedTiers[earnedTiers.length - 1] : null;
        var hasEarned = earnedTiers.length > 0;

        var stars = "";
        for (var i = 0; i < tiers.length; i++) {
          stars += (i < earnedTiers.length) ? "★" : "☆";
        }

        var groupDiv = document.createElement("div");
        groupDiv.className = "animal-group" + (hasEarned ? " has-earned" : "");
        groupDiv.innerHTML =
          '<div class="animal-group-header">' +
            '<span class="animal-group-icon">' + group.icon + '</span>' +
            '<span class="animal-group-name">' + group.name + '</span>' +
            '<span class="animal-stars">' + stars + '</span>' +
            '<span class="animal-current">' + (hasEarned ? highestEarned.label : (loggedIn ? "未達成" : "-")) + '</span>' +
          '</div>' +
          '<div class="animal-tier-list"></div>';

        var tierList = groupDiv.querySelector(".animal-tier-list");
        tiers.forEach(function(b) {
          var earned = loggedIn && b.check(items);
          var item = document.createElement("div");
          item.className = "animal-tier-item" + (earned ? " earned" : "");
          item.innerHTML =
            '<span class="tier-dot"></span>' +
            '<span class="tier-name">' + b.label + '</span>' +
            '<span class="tier-req-text">' + b.req + '</span>' +
            (earned ? '<span style="margin-left:auto;font-size:12px;">✅</span>' : '');
          tierList.appendChild(item);
        });

        list4.appendChild(groupDiv);
      });

      sec4.appendChild(list4);
      content.appendChild(sec4);

      // --- 地域制覇 ---
      var sec3 = document.createElement("div");
      sec3.className = "missions-section";
      var completedRegions = loggedIn ? REGION_ORDER.filter(function(r) {
        var inR = openItems.filter(function(x) { return regionOf(x.prefecture) === r; });
        return inR.length > 0 && inR.every(function(x) { return x.visited; });
      }).length : 0;
      sec3.innerHTML = '<h2>地域制覇（' + (loggedIn ? completedRegions + " / " + REGION_ORDER.length + " 地域達成" : "ログインで表示") + '）</h2>';
      var list3 = document.createElement("div");
      list3.className = "badge-list";
      REGION_ORDER.forEach(function(r) {
        var inR = openItems.filter(function(x) { return regionOf(x.prefecture) === r; });
        var visitedInR = loggedIn ? inR.filter(function(x) { return x.visited; }).length : 0;
        var earned = loggedIn && inR.length > 0 && inR.every(function(x) { return x.visited; });
        var req = loggedIn ? visitedInR + " / " + inR.length + " 園" : inR.length + " 園";
        var pct = inR.length > 0 ? Math.round(visitedInR / inR.length * 100) : 0;
        list3.appendChild(makeRow("🗾", r + "制覇", req, earned, "region", pct));
      });
      sec3.appendChild(list3);
      content.appendChild(sec3);

      // --- 都道府県制覇（PREF_ORDER順） ---
      var sec2 = document.createElement("div");
      sec2.className = "missions-section";
      var allPrefs = [...new Set(openItems.map(function(x) { return x.prefecture; }))];
      var prefs = allPrefs.sort(function(a, b) {
        var ai = PREF_ORDER.indexOf(a), bi = PREF_ORDER.indexOf(b);
        if (ai === -1) ai = 99; if (bi === -1) bi = 99;
        return ai - bi;
      });
      var completedCount = loggedIn ? prefs.filter(function(p) {
        var inPref = openItems.filter(function(x) { return x.prefecture === p; });
        return inPref.length > 0 && inPref.every(function(x) { return x.visited; });
      }).length : 0;
      sec2.innerHTML = '<h2>都道府県制覇（' + (loggedIn ? completedCount + " / " + prefs.length + " 県達成" : "ログインで表示") + '）</h2>';
      var grid = document.createElement("div");
      grid.className = "pref-grid";
      prefs.forEach(function(p) {
        var inPref = openItems.filter(function(x) { return x.prefecture === p; });
        var visitedInPref = loggedIn ? inPref.filter(function(x) { return x.visited; }).length : 0;
        var earned = loggedIn && inPref.length > 0 && inPref.every(function(x) { return x.visited; });
        var pct = inPref.length > 0 ? Math.round(visitedInPref / inPref.length * 100) : 0;
        var item = document.createElement("div");
        item.className = "pref-item" + (earned ? " earned" : "");
        if (loggedIn && !earned && pct > 0) {
          item.style.background = "linear-gradient(to right, #c8e6c9 " + pct + "%, #fafafa " + pct + "%)";
        }
        item.innerHTML =
          '<span class="pref-name">' + (earned ? "📍 " : "") + p + '</span>' +
          '<span class="pref-progress">' + (loggedIn ? visitedInPref + "/" + inPref.length : inPref.length + "園") + '</span>';
        grid.appendChild(item);
      });
      sec2.appendChild(grid);
      content.appendChild(sec2);
    })();
  })();
  </script>
</body>
</html>
