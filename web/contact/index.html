<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>お問い合わせ｜全国動物園スタンプラリー</title>
  <meta name="description" content="全国動物園スタンプラリーへのお問い合わせはこちらから。">
  <link rel="canonical" href="https://zoo-log.onrender.com/contact/">
  <link rel="stylesheet" href="/styles.css?v=20260318-1" />
  <style>

    .contact-wrap {
      max-width: 600px;
      margin: 24px auto;
      padding: 0 16px;
      line-height: 1.9;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      opacity: 0.85;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #b7e4c7;
      background: white;
      color: #1b3a2d;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }
    .submit-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #48bb78;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #38a169; }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    #result {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }
    #result.success {
      background: #f1f8e9;
      color: #1b5e38;
      border: 1px solid #b7e4c7;
    }
    #result.error {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #ffcdd2;
    }
  </style>
</head>

<body>
  <header>
    <h1><a href="/" style="color:inherit;text-decoration:none;">全国動物園スタンプラリー</a></h1>
    <div class="userbox" id="userbox">
      <button id="menuBtn" class="hamburger-btn" aria-label="メニューを開く">☰</button>
    </div>
  </header>

  <div id="drawerOverlay" class="drawer-overlay"></div>
  <nav id="drawer" class="drawer" aria-hidden="true">
    <button id="drawerClose" class="drawer-close" aria-label="閉じる">×</button>
    <div class="drawer__login">
      <span id="loginStatus" class="drawer-login-status"></span>
      <button class="linklike" id="googleLogin" type="button">Googleでログイン</button>
      <button class="linklike" id="logoutBtn" type="button" style="display:none;">ログアウト</button>
    </div>
    <div class="drawer__inner">
      <a href="/" class="drawer-link">トップページ</a>
      <a href="/about/" class="drawer-link">このアプリについて</a>
      <a href="/missions/" class="drawer-link">🏆 ミッション</a>
      <a id="galleryBtn" href="/gallery/" class="drawer-link" style="display:none;">📷 マイ写真ギャラリー</a>
      <a href="/contact/" class="drawer-link">お問い合わせ</a>
      <a href="/privacy/" class="drawer-link">プライバシーポリシー</a>
    </div>
  </nav>

  <div class="contact-wrap">

    <h1>お問い合わせ</h1>
    <p>ご要望・不具合報告・データ削除依頼などはこちらからどうぞ。</p>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">お名前</label>
        <input type="text" id="name" name="name" placeholder="山田 太郎" required />
      </div>
      <div class="form-group">
        <label for="email">メールアドレス（返信先）</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required />
      </div>
      <div class="form-group">
        <label for="message">お問い合わせ内容</label>
        <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">送信する</button>
    </form>

    <div id="result"></div>

    <p style="margin-top: 32px; font-size: 12px; opacity: 0.6;">
      送信いただいた情報は、お問い合わせ対応以外の目的には使用しません。<br>
      詳しくは<a href="/privacy/">プライバシーポリシー</a>をご覧ください。
    </p>
  </div>

  <script>
    (function () {
      const form = document.getElementById("contactForm");
      const btn = document.getElementById("submitBtn");
      const result = document.getElementById("result");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        btn.disabled = true;
        btn.textContent = "送信中...";
        result.style.display = "none";

        const body = {
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          message: document.getElementById("message").value.trim(),
        };

        try {
          const res = await fetch("/api/public/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          if (res.ok) {
            result.className = "success";
            result.textContent = "お問い合わせを受け付けました。ありがとうございます。";
            result.style.display = "block";
            form.reset();
          } else {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.detail || "送信に失敗しました");
          }
        } catch (err) {
          result.className = "error";
          result.textContent = "エラー: " + err.message;
          result.style.display = "block";
        } finally {
          btn.disabled = false;
          btn.textContent = "送信する";
        }
      });
    })();
  </script>

  <footer class="site-footer">
    <div class="footer-inner">
      <a href="/contact/">お問い合わせ</a>
      <a href="/privacy/">プライバシーポリシー</a>
      <span>© 2025 全国動物園スタンプラリー</span>
    </div>
  </footer>

  <script src="/nav.js?v=20260318-1"></script>
</body>
</html>
